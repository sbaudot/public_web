    <style>
	.accordion-container { max-width: 800px; margin: 0 auto; font-family: 'Cormorant Garamond',serif; font-size:24px; font-style: italic;}
	details { margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; overflow: hidden; }
	summary { padding: 15px; cursor: pointer; font-weight: bold; background: #f9f9f9; list-style: none; display: flex; justify-content: space-between; align-items: center; }

	summary::after { content: '＋'; font-size: 0.8em; font-style: normal;}
	details[open] summary::after { content: '－'; }

	.table-wrapper { overflow-x: auto; padding: 10px; }
	table { width: 100%; border-collapse: collapse; margin-top: 10px; }
	th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; font-family: 'Jost', sans-serif; font-style: normal;font-size:0.8em;}

    <section class="features" id="pricing">
        <div class="features-content">
            <h2>Price list</h2>
                <div id="price-list-container" class="accordion-container">
                    <!-- The JavaScript will inject the accordions here -->
                </div>
        </div>
    </section>


</body>
</html>
<script>
async function loadPriceList() {
    try {
        const response = await fetch('price_list.json');
        const data = await response.json();
        
        // Group data by category
        const categories = data.reduce((acc, item) => {
            if (!acc[item.Category]) acc[item.Category] = [];
            acc[item.Category].push(item);
            return acc;
        }, {});

        const container = document.getElementById('price-list-container');

        // Create HTML for each category
        for (const category in categories) {
            const details = document.createElement('details');
            details.setAttribute('name', 'price-group'); // This makes them exclusive

            const summary = document.createElement('summary');
            summary.textContent = category;
            
            const tableWrapper = document.createElement('div');
            tableWrapper.className = 'table-wrapper';
            
            let tableHTML = `<table><thead><tr><th>Service</th><th>Duration</th><th>Cost</th></tr></thead><tbody>`;
            categories[category].forEach(item => {
                tableHTML += `<tr><td>${item.Service}</td><td>${item.Duration}</td><td>${item.Cost}</td></tr>`;
            });
            tableHTML += `</tbody></table>`;
            
            tableWrapper.innerHTML = tableHTML;
            details.appendChild(summary);
            details.appendChild(tableWrapper);
            container.appendChild(details);
        }
    } catch (error) {
        console.error("Error loading price list:", error);
    }
}

loadPriceList();
</script>
